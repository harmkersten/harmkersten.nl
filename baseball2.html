    const HIT_POSITIONS = ["C","1B","2B","SS","3B","OF","DH","LF","RF","CF"];
    const PIT_POSITIONS = ["SP","RP"];

    function posMatch(playerPos, filter) {
      if (filter === "ALL") return true;
      if (filter === "HIT") return HIT_POSITIONS.some(p => playerPos.includes(p));
      if (filter === "PIT") return PIT_POSITIONS.includes(playerPos);
      if (filter === "OF") return ["OF","LF","RF","CF"].some(p => playerPos.includes(p));
      return playerPos.includes(filter);
    }

    function isPitcher(p) { return p.pos === "SP" || p.pos === "RP"; }

    function PtsBar({ pts, max }) {
      const pct = Math.max(0, Math.min(100, (pts / max) * 100));
      const color = pts > 450 ? "#1a1916" : pts > 380 ? "#4a4640" : pts > 300 ? "#7a7670" : pts > 200 ? "#a8a4a0" : "#d0ccc8";
      return (
        <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
          <div style={{ width:"48px", height:"1px", background:"#e0dbd4" }}>
            <div style={{ width:`${pct}%`, height:"100%", background:color }} />
          </div>
          <span style={{ fontSize:"12px", fontFamily:"'Karla',sans-serif", fontWeight:"400", color, minWidth:"28px" }}>{pts}</span>
        </div>
      );
    }

    const TABS = ["ALL","HIT","PIT","C","1B","2B","SS","3B","OF","DH","SP","RP"];

    function App() {
      const [tab, setTab] = useState("ALL");
      const [sort, setSort] = useState("pts");
      const [search, setSearch] = useState("");
      const [page, setPage] = useState(0);
      const PER_PAGE = 50;

      const allPlayers = useMemo(() => [...hitters, ...pitchers], []);
      const maxPts = useMemo(() => Math.max(...allPlayers.map(p => p.pts)), [allPlayers]);

      const filtered = useMemo(() => {
        let list = allPlayers.filter(p => posMatch(p.pos, tab));
        if (search) {
          const q = search.toLowerCase();
          list = list.filter(p => p.name.toLowerCase().includes(q) || p.team.toLowerCase().includes(q) || p.pos.toLowerCase().includes(q));
        }
        if (sort === "pts") list = [...list].sort((a,b) => b.pts - a.pts);
        else list = [...list].sort((a,b) => a.rk - b.rk);
        return list;
      }, [tab, search, sort, allPlayers]);

      const paged = filtered.slice(page * PER_PAGE, (page + 1) * PER_PAGE);
      const totalPages = Math.ceil(filtered.length / PER_PAGE);

      return (
        <div style={{ minHeight:"100vh", background:"#faf9f7" }}>

          {/* Header */}
          <div style={{ padding:"32px 48px 28px", borderBottom:"1px solid #e0dbd4" }}>
            <a href="/" style={{ fontSize:"11px", letterSpacing:"2px", textTransform:"uppercase", color:"#b8b4ae", textDecoration:"none", display:"inline-block", marginBottom:"32px" }}>← HK</a>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end" }}>
              <div>
                <p style={{ fontSize:"10px", letterSpacing:"3px", textTransform:"uppercase", color:"#b8b4ae", marginBottom:"12px" }}>
                  ESPN · 8 TEAMS · 1100 IP CAP
                </p>
                <h1 style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:"clamp(28px,5vw,56px)", fontWeight:"300", lineHeight:"1", letterSpacing:"-0.5px", color:"#1a1916" }}>
                  Harm's <em style={{ fontStyle:"italic" }}>Draftguide</em>
                </h1>
                <p style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:"16px", fontWeight:"300", fontStyle:"italic", color:"#7a7670", marginTop:"6px", letterSpacing:"0.3px" }}>
                  2026 Fantasy Baseball
                </p>
              </div>
              <div style={{ display:"flex", gap:"5px", flexWrap:"wrap", maxWidth:"400px", justifyContent:"flex-end" }}>
                {[["R/TB/RBI/BB/SB","+1"],["K bat","−1"],["IP","+3"],["SV","+5"],["W/HD","+2"],["K pit","+1"],["ER","−2"],["L","−2"],["H/BB pit","−1"]].map(([l,v]) => (
                  <span key={l} style={{
                    fontSize:"10px", fontWeight:"400",
                    color: v.startsWith("+") ? "#1a1916" : "#a0504a",
                    border:"1px solid #e0dbd4",
                    padding:"2px 8px",
                  }}>{l} {v}</span>
                ))}
              </div>
            </div>
          </div>

          {/* Controls */}
          <div style={{ padding:"16px 48px", borderBottom:"1px solid #e0dbd4", display:"flex", gap:"32px", alignItems:"center", flexWrap:"wrap" }}>

                  border:"none",

                  color:"#1a1916",
                  padding:"4px 0",
                  fontSize:"12px",
                  width:"160px",
                  letterSpacing:"0.3px",
                }}
              />
              <div style={{ display:"flex", gap:"12px" }}>
                {[["pts","Punten"],["rk","FP Rank"]].map(([key,label]) => (
                  <button key={key} onClick={() => setSort(key)} style={{
                    background:"transparent",
                    color: sort===key ? "#1a1916" : "#b8b4ae",

                    letterSpacing:"1px",

                    borderBottom: sort===key ? "1px solid #1a1916" : "1px solid transparent",
                  }}>{label}</button>
                ))}
              </div>
              <span style={{ fontSize:"11px", color:"#b8b4ae", letterSpacing:"0.5px" }}>{filtered.length}</span>
            </div>
          </div>

          {/* Column headers */}
          <div style={{
            display:"grid",
            gridTemplateColumns:"40px 40px 1fr 52px 56px 100px 1fr",
            padding:"8px 48px",
            borderBottom:"1px solid #e0dbd4",
            background:"#f5f2ee",
          }}>

              <span key={h} style={{ fontSize:"9px", color:"#b8b4ae", letterSpacing:"2px", textTransform:"uppercase" }}>{h}</span>
            ))}
          </div>

          {/* Rows */}
          {paged.map((p, i) => {
            const globalIdx = page * PER_PAGE + i + 1;
            const isP = isPitcher(p);
            const ptColor = p.pts > 450 ? "#1a1916" : p.pts > 380 ? "#4a4640" : p.pts > 300 ? "#7a7670" : "#a8a4a0";
            return (
              <div key={p.name+p.rk}
                style={{
                  display:"grid",
                  gridTemplateColumns:"40px 40px 1fr 52px 56px 100px 1fr",
                  alignItems:"center",
                  padding:"10px 48px",
                  borderBottom:"1px solid #f0ede8",
                  transition:"background 0.1s",
                  cursor:"default",
                }}
                onMouseEnter={e => e.currentTarget.style.background="#f5f2ee"}
                onMouseLeave={e => e.currentTarget.style.background="transparent"}
              >
                <span style={{ fontSize:"10px", color:"#d0ccc8", fontWeight:"300" }}>{globalIdx}</span>
                <span style={{ fontSize:"10px", color:"#c0bcb8", fontWeight:"300" }}>{p.rk}</span>
                <span style={{ fontSize:"14px", color:"#1a1916", fontFamily:"'Cormorant Garamond',serif", fontWeight:"400", letterSpacing:"0.2px" }}>
                  {p.name.replace(" - H","")}
                </span>
                <span style={{ fontSize:"11px", color:ptColor, fontWeight:"400", letterSpacing:"0.5px" }}>{p.team}</span>
                <span style={{ fontSize:"11px", color:"#a8a4a0", letterSpacing:"0.5px" }}>{p.pos}</span>
                <PtsBar pts={p.pts} max={maxPts} />
                <span style={{ fontSize:"10px", color:"#b8b4ae", letterSpacing:"0.3px" }}>
                  {isP
                    ? `${p.ip}ip  ${p.k}k  ${p.w}w${p.sv>0?"  "+p.sv+"sv":""}  ${p.era}`
                    : `r${p.r}  hr${p.hr}  rbi${p.rbi}  sb${p.sb}  .${String(Math.round(p.avg*1000)).padStart(3,"0")}`
                  }
                </span>
              </div>
            );
          })}

          {/* Pagination */}
          {totalPages > 1 && (
            <div style={{ display:"flex", justifyContent:"center", alignItems:"center", gap:"24px", padding:"32px 48px", borderTop:"1px solid #e0dbd4" }}>
              <button onClick={() => setPage(p => Math.max(0,p-1))} disabled={page===0} style={{ background:"none", border:"none", fontSize:"11px", letterSpacing:"1px", color: page===0?"#d0ccc8":"#7a7670", padding:"0" }}>← Vorige</button>
              <span style={{ fontSize:"11px", color:"#b8b4ae", letterSpacing:"1px" }}>{page+1} / {totalPages}</span>
              <button onClick={() => setPage(p => Math.min(totalPages-1,p+1))} disabled={page===totalPages-1} style={{ background:"none", border:"none", fontSize:"11px", letterSpacing:"1px", color: page===totalPages-1?"#d0ccc8":"#7a7670", padding:"0" }}>Volgende →</button>
            </div>
          )}

          <div style={{ padding:"16px 48px 32px", borderTop:"1px solid #f0ede8" }}>
            <p style={{ fontSize:"10px", color:"#c0bcb8", letterSpacing:"0.3px" }}>
