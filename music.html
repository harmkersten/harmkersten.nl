<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music — Harm Kersten</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Karla:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --white: #faf9f7;
      --ink:   #1a1916;
      --mid:   #7a7670;
      --light: #b8b4ae;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--white);
      color: var(--ink);
      font-family: 'Karla', sans-serif;
      font-weight: 300;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 32px 48px;
      border-bottom: 1px solid #e0dbd4;
    }

    .nav-back {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--mid);
      text-decoration: none;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-back:hover { color: var(--ink); }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--ink);
      text-decoration: none;
    }

    .lang-toggle {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .lang-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Karla', sans-serif;
      font-size: 11px;
      letter-spacing: 1.5px;
      color: var(--light);
      padding: 0;
      transition: color 0.2s;
    }
    .lang-btn.active { color: var(--ink); font-weight: 500; }
    .lang-btn:hover { color: var(--mid); }

    /* ── HEADER ── */
    .page-header {
      padding: 80px 48px 64px;
      border-bottom: 1px solid #e0dbd4;
    }

    .page-eyebrow {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--light);
      margin-bottom: 20px;
    }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(48px, 8vw, 96px);
      font-weight: 300;
      line-height: 0.95;
      letter-spacing: -1px;
      color: var(--ink);
      margin-bottom: 24px;
    }

    .page-title em { font-style: italic; }

    .page-subtitle {
      font-size: 14px;
      font-weight: 300;
      color: var(--mid);
      letter-spacing: 0.3px;
    }

    /* ── CONTENT ── */
    .content {
      padding: 80px 48px;
      min-height: 40vh;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 30vh;
      text-align: center;
      gap: 16px;
    }

    .empty-icon {
      font-size: 32px;
      opacity: 0.2;
    }

    .empty-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 300;
      font-style: italic;
      color: var(--light);
    }

    /* ── FOOTER ── */
    footer {
      padding: 24px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #e0dbd4;
    }
    footer span {
      font-size: 11px;
      color: var(--light);
      letter-spacing: 1px;
    }

    /* ── LANG ── */
    [data-lang="en"] { display: none; }
    body.lang-en [data-lang="nl"] { display: none; }
    body.lang-en [data-lang="en"] { display: block; }
    body.lang-en span[data-lang="en"] { display: inline; }
    body.lang-en span[data-lang="nl"] { display: none; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      nav, .page-header, .content, footer { padding-left: 24px; padding-right: 24px; }
      .page-header { padding-top: 48px; padding-bottom: 40px; }
    }

    .carousel {
      position: relative;
      width: 100%;
      max-width: 480px;
      margin-bottom: 48px;
      overflow: hidden;
    }

    .carousel-track {
      display: flex;
      transition: transform 0.4s ease;
    }

    .carousel-track img {
      width: 100%;
      flex-shrink: 0;
      aspect-ratio: 3/4;
      object-fit: cover;
      filter: grayscale(100%);
      display: block;
    }

    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(250,249,247,0.85);
      border: 1px solid #e0dbd4;
      color: #1a1916;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
      z-index: 2;
    }
    .carousel-btn:hover { background: #faf9f7; }
    .carousel-btn.prev { left: 12px; }
    .carousel-btn.next { right: 12px; }

    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 12px;
    }

    .carousel-dot {
      width: 4px;
      height: 4px;
      background: #e0dbd4;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: background 0.2s;
    }
    .carousel-dot.active { background: #1a1916; }

    .video-hero {
      position: relative;
      width: 100%;
      aspect-ratio: 1916/690;
      overflow: hidden;
      margin-bottom: 48px;
    }

    .video-hero video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .page-wrap {
      max-width: 960px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
<div class="page-wrap">

  <nav>
    <a href="/" class="nav-back">← <span data-lang="nl">Terug</span><span data-lang="en">Back</span></a>
    <a href="/" class="nav-logo">HK</a>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-nl" onclick="setLang('nl')">NL</button>
      <span style="color:#d0ccc6">/</span>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </nav>

  <header class="page-header">
    <p class="page-eyebrow">Harm Kersten</p>
    <h1 class="page-title">Music</h1>
    <p class="page-subtitle">
      <span data-lang="nl">Compositie & productie</span>
      <span data-lang="en">Composition & production</span>
    </p>
  </header>

  <main class="content">
    <div style="max-width: 480px;">
      <div class="video-hero">
        <video autoplay muted loop playsinline>
          <source src="music_photo/visuals.mp4" type="video/mp4">
        </video>
      </div>

      <div class="carousel" id="carousel">
        <div class="carousel-track" id="carouselTrack">
          <img src="music_photo/photo1.jpg" alt="">
          <img src="music_photo/photo2.jpg" alt="">
          <img src="music_photo/photo3.jpg" alt="">
          <img src="music_photo/photo4.jpg" alt="">
          <img src="music_photo/photo5.jpg" alt="">
          <img src="music_photo/photo6.jpg" alt="">
        </div>
        <button class="carousel-btn prev" onclick="carouselMove(-1)">←</button>
        <button class="carousel-btn next" onclick="carouselMove(1)">→</button>
        <div class="carousel-dots" id="carouselDots"></div>
      </div>

      <div style="margin-bottom:40px;">
        <iframe style="border-radius:0" src="https://open.spotify.com/embed/track/5iK0X3T6Hoyo9XxcKSaOqS?utm_source=generator" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      </div>
      <p style="font-size:11px; letter-spacing:3px; text-transform:uppercase; color:#b8b4ae; margin-bottom:32px;">
        <span data-lang="nl">Beluister</span>
        <span data-lang="en">Listen</span>
      </p>
      <a href="https://open.spotify.com/artist/6H98yskOKv4xTHKNf16gNg?si=SZpAXoGoRjmDc6_SB8suTQ"
         target="_blank"
         style="display:inline-flex; align-items:center; gap:16px; text-decoration:none; border-bottom:1px solid #e0dbd4; padding-bottom:20px; width:100%; transition:border-color 0.2s;"
         onmouseover="this.style.borderColor='#1a1916'"
         onmouseout="this.style.borderColor='#e0dbd4'">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="12" fill="#1DB954"/>
          <path d="M17.25 16.5C17.25 16.914 16.914 17.25 16.5 17.25C16.086 17.25 15.75 16.914 15.75 16.5C15.75 16.086 16.086 15.75 16.5 15.75C16.914 15.75 17.25 16.086 17.25 16.5Z" fill="white"/>
          <path d="M7 9.5C9.667 8.333 14 8.5 17 10.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M7.5 12.5C9.833 11.5 13.5 11.5 16.5 13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M8.5 15.5C10.167 14.833 13 14.667 15.5 15.833" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <div>
          <p style="font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:400; color:#1a1916; letter-spacing:0.3px;">bloc bloc bloc</p>
          <p style="font-size:11px; color:#b8b4ae; letter-spacing:1px; margin-top:3px;">
            <span data-lang="nl">Beluister op Spotify</span>
            <span data-lang="en">Listen on Spotify</span>
          </p>
        </div>
      </a>

      <a href="https://www.instagram.com/blocblocbloc_/"
         target="_blank"
         style="display:inline-flex; align-items:center; gap:16px; text-decoration:none; border-bottom:1px solid #e0dbd4; padding-bottom:20px; margin-top:20px; width:100%; transition:border-color 0.2s;"
         onmouseover="this.style.borderColor='#1a1916'"
         onmouseout="this.style.borderColor='#e0dbd4'">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="24" height="24" rx="6" fill="#1a1916"/>
          <rect x="6" y="6" width="12" height="12" rx="3.5" stroke="white" stroke-width="1.5"/>
          <circle cx="12" cy="12" r="3" stroke="white" stroke-width="1.5"/>
          <circle cx="16" cy="8" r="0.75" fill="white"/>
        </svg>
        <div>
          <p style="font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:400; color:#1a1916; letter-spacing:0.3px;">@blocblocbloc_</p>
          <p style="font-size:11px; color:#b8b4ae; letter-spacing:1px; margin-top:3px;">
            <span data-lang="nl">Volg op Instagram</span>
            <span data-lang="en">Follow on Instagram</span>
          </p>
        </div>
      </a>
    </div>
  </main>

  <footer>
    <span>© 2026 Harm Kersten</span>
    <span>harmkersten.nl</span>
  </footer>

  <script>

    // Carousel
    const track = document.getElementById('carouselTrack');
    const dotsContainer = document.getElementById('carouselDots');
    const total = track ? track.children.length : 0;
    let current = 0;

    if (track && total > 0) {
      // Create dots
      for (let i = 0; i < total; i++) {
        const dot = document.createElement('button');
        dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
        dot.onclick = () => goTo(i);
        dotsContainer.appendChild(dot);
      }

      function goTo(n) {
        current = (n + total) % total;
        track.style.transform = `translateX(-${current * 100}%)`;
        document.querySelectorAll('.carousel-dot').forEach((d, i) => {
          d.classList.toggle('active', i === current);
        });
      }

      window.carouselMove = (dir) => goTo(current + dir);
    }

    function setLang(lang) {
      document.body.className = 'lang-' + lang;
      document.getElementById('btn-nl').classList.toggle('active', lang === 'nl');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    }
  </script>

</div>
</body>
</html>
