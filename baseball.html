    const HIT_POSITIONS = ["C","1B","2B","SS","3B","OF","DH","LF","RF","CF"];
    const PIT_POSITIONS = ["SP","RP"];

    function posMatch(playerPos, filter) {
      if (filter === "ALL") return true;
      if (filter === "HIT") return HIT_POSITIONS.some(p => playerPos.includes(p));
      if (filter === "PIT") return PIT_POSITIONS.includes(playerPos);
      if (filter === "OF") return ["OF","LF","RF","CF"].some(p => playerPos.includes(p));
      return playerPos.includes(filter);
    }

    function isPitcher(p) { return p.pos === "SP" || p.pos === "RP"; }

    function PtsBar({ pts, max }) {
      const pct = Math.max(0, Math.min(100, (pts / max) * 100));
      const color = pts > 450 ? "#FFD700" : pts > 380 ? "#7ac0f0" : pts > 300 ? "#5cb87a" : pts > 200 ? "#cd7f32" : "#555";
      return (
        <div style={{ display:"flex", alignItems:"center", gap:"6px" }}>
          <div style={{ width:"60px", height:"4px", background:"rgba(255,255,255,0.06)", borderRadius:"2px" }}>
            <div style={{ width:`${pct}%`, height:"100%", background:color, borderRadius:"2px" }} />
          </div>
          <span style={{ fontSize:"11px", fontFamily:"'IBM Plex Mono',monospace", color, minWidth:"28px", textAlign:"right" }}>{pts}</span>
        </div>
      );
    }

    const TABS = ["ALL","HIT","PIT","C","1B","2B","SS","3B","OF","DH","SP","RP"];

      const [search, setSearch] = useState("");
      const [page, setPage] = useState(0);
      const PER_PAGE = 50;

      const allPlayers = useMemo(() => [...hitters, ...pitchers], []);
      const maxPts = useMemo(() => Math.max(...allPlayers.map(p => p.pts)), [allPlayers]);

      const filtered = useMemo(() => {
        let list = allPlayers.filter(p => posMatch(p.pos, tab));
        if (search) {
          const q = search.toLowerCase();
          list = list.filter(p => p.name.toLowerCase().includes(q) || p.team.toLowerCase().includes(q) || p.pos.toLowerCase().includes(q));
        }
        if (sort === "pts") list = [...list].sort((a,b) => b.pts - a.pts);
        else list = [...list].sort((a,b) => a.rk - b.rk);
        return list;
      }, [tab, search, sort, allPlayers]);

      const paged = filtered.slice(page * PER_PAGE, (page + 1) * PER_PAGE);
      const totalPages = Math.ceil(filtered.length / PER_PAGE);

      const handleSearch = (v) => { setSearch(v); setPage(0); };
      const handleTab = (t) => { setTab(t); setPage(0); };

      return (
        <div style={{ minHeight:"100vh", background:"#07090d", fontFamily:"'IBM Plex Mono',monospace", color:"#e0d8cc" }}>

              ⚾ 2026 Fantasy Baseball Draft Board
            </h1>
            <div style={{ display:"flex", gap:"4px", flexWrap:"wrap" }}>
              {[["R/TB/RBI/BB/SB","+1"],["K bat","−1"],["IP","+3"],["SV","+5"],["W/HD","+2"],["K pit","+1"],["ER","−2"],["L","−2"],["H/BB pit","−1"]].map(([l,v]) => (
                <span key={l} style={{
                  fontSize:"9px",
                  color: v.startsWith("+") ? "#5cb87a" : "#e05c5c",
                  background: v.startsWith("+") ? "rgba(92,184,122,0.08)" : "rgba(224,92,92,0.08)",

                  padding:"2px 5px", borderRadius:"3px",
                }}>{l} <b>{v}</b></span>
              ))}
            </div>
          </div>

          {/* Tabs */}
          <div style={{ display:"flex", padding:"8px 14px 0", background:"#07090d", borderBottom:"1px solid #0f1820", overflowX:"auto", gap:"1px" }}>

                color: tab===t ? "#7ac0f0" : "#4a6070",
                border:"none", padding:"6px 12px", fontSize:"11px",
                cursor:"pointer",
                borderRadius:"4px 4px 0 0",
                borderBottom: tab===t ? "2px solid #4a9fd4" : "2px solid transparent",
                whiteSpace:"nowrap",
              }}>{t}</button>
            ))}
          </div>

          {/* Controls */}

                <button key={key} onClick={() => setSort(key)} style={{

            ))}
          </div>

          {/* Rows */}
          {paged.map((p, i) => {
            const globalIdx = page * PER_PAGE + i + 1;
            const ptColor = p.pts > 450 ? "#FFD700" : p.pts > 380 ? "#7ac0f0" : p.pts > 300 ? "#5cb87a" : p.pts > 200 ? "#cd7f32" : "#555";
            const isP = isPitcher(p);
            return (
              <div key={p.name+p.rk} style={{
                display:"grid", gridTemplateColumns:"34px 40px 1fr 44px 72px 100px 1fr",
                alignItems:"center", padding:"8px 14px",
                background: i%2===0 ? "rgba(255,255,255,0.01)" : "transparent",

                <span style={{ fontSize:"10px", color:"#3a5a6a" }}>{p.rk}</span>
                <span style={{ fontSize:"13px", color:"#f0e8d8", fontWeight:"500", fontFamily:"'Playfair Display',serif" }}>{p.name.replace(" - H","")}</span>

                <span style={{ fontSize:"10px", color:"#4a6a7a" }}>{p.pos}</span>
                <PtsBar pts={p.pts} max={maxPts} />
                <span style={{ fontSize:"10px", color:"#4a6070" }}>
                  {isP
                    ? `${p.ip}IP ${p.k}K ${p.w}W ${p.sv>0?p.sv+"SV ":""}${p.era}ERA`
                    : `R${p.r} HR${p.hr} RBI${p.rbi} SB${p.sb} .${String(Math.round(p.avg*1000)).padStart(3,"0")}`
                  }
                </span>
              </div>
            );
          })}

          {/* Pagination */}
          {totalPages > 1 && (
            <div style={{ display:"flex", justifyContent:"center", gap:"6px", padding:"16px", borderTop:"1px solid #0f1820" }}>
              <button onClick={() => setPage(0)} disabled={page===0} style={{ background:"#0f1820", border:"1px solid #1a3040", color: page===0?"#2a4050":"#7ac0f0", padding:"5px 10px", borderRadius:"3px", fontSize:"11px" }}>«</button>
              <button onClick={() => setPage(p => Math.max(0,p-1))} disabled={page===0} style={{ background:"#0f1820", border:"1px solid #1a3040", color: page===0?"#2a4050":"#7ac0f0", padding:"5px 10px", borderRadius:"3px", fontSize:"11px" }}>‹</button>
              <span style={{ padding:"5px 12px", fontSize:"11px", color:"#4a6a7a" }}>{page+1} / {totalPages}</span>
              <button onClick={() => setPage(p => Math.min(totalPages-1,p+1))} disabled={page===totalPages-1} style={{ background:"#0f1820", border:"1px solid #1a3040", color: page===totalPages-1?"#2a4050":"#7ac0f0", padding:"5px 10px", borderRadius:"3px", fontSize:"11px" }}>›</button>
              <button onClick={() => setPage(totalPages-1)} disabled={page===totalPages-1} style={{ background:"#0f1820", border:"1px solid #1a3040", color: page===totalPages-1?"#2a4050":"#7ac0f0", padding:"5px 10px", borderRadius:"3px", fontSize:"11px" }}>»</button>
            </div>
          )}
