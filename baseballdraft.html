}

  if (!cats || !cats.length) return null;
  return (
    <span style={{display:"inline-flex",gap:"3px"}}>
      {cats.slice(0,2).map(c => {
        const col = PC[c] || "#888";
        return (
          <span key={c} style={{fontSize:"9px",fontFamily:"monospace",color:col,background:col+"18",border:"1px solid "+col+"40",padding:"1px 5px",borderRadius:"2px"}}>
            {c}
          </span>
        );
      })}
    </span>
  );
}

function StatPills({ statobj, type }) {
  if (!statobj) return null;
  const pills = type === "HIT"
    ? [
        { k:"R",   v:statobj.R,   hi: statobj.R   >= 90   },
        { k:"HR",  v:statobj.HR,  hi: statobj.HR  >= 25   },
        { k:"RBI", v:statobj.RBI, hi: statobj.RBI >= 85   },
        { k:"TB",  v:statobj.TB,  hi: statobj.TB  >= 260  },
        { k:"BB",  v:statobj.BB,  hi: statobj.BB  >= 65   },
        { k:"SB",  v:statobj.SB,  hi: statobj.SB  >= 20   },
        { k:"K",   v:"-"+statobj.K, hi: false      },
        { k:"AVG", v:statobj.AVG, hi: parseFloat(statobj.AVG) >= 0.280 },
      ]
    : [
        { k:"IP",  v:statobj.IP,  hi: statobj.IP  >= 170  },
        { k:"K",   v:statobj.K,   hi: statobj.K   >= 180  },
        { k:"W",   v:statobj.W,   hi: statobj.W   >= 12   },
        { k:"SV",  v:statobj.SV,  hi: statobj.SV  >= 25, hide: statobj.SV === 0 && statobj.HD > 0 },
        { k:"HD",  v:statobj.HD,  hi: statobj.HD  >= 20, hide: statobj.HD === 0 },
        { k:"ERA", v:statobj.ERA, hi: parseFloat(statobj.ERA) <= 3.40 },
        { k:"BB-", v:statobj.BB,  hi: false        },
        { k:"L-",  v:statobj.L,   hi: false        },
      ];
  return (
    <span style={{display:"inline-flex",gap:"3px",flexWrap:"wrap"}}>
      {pills.filter(p => !p.hide).map(p => {
        const bg  = p.hi ? "rgba(255,255,255,0.13)" : "rgba(0,0,0,0.25)";
        const bd  = p.hi ? "1px solid rgba(255,255,255,0.3)" : "1px solid rgba(255,255,255,0.08)";
        const kc  = p.hi ? "#a0b898" : "#3a5a4a";
        const vc  = p.hi ? "#f4f0e4" : "#6a8a78";
        const fw  = p.hi ? "600" : "400";
        return (
          <span key={p.k} style={{display:"inline-flex",flexDirection:"column",alignItems:"center",background:bg,border:bd,borderRadius:"3px",padding:"1px 5px",minWidth:"28px"}}>
            <span style={{fontSize:"8px",color:kc,fontFamily:"monospace",lineHeight:"1.2"}}>{p.k}</span>
            <span style={{fontSize:"11px",color:vc,fontFamily:"monospace",fontWeight:fw,lineHeight:"1.2"}}>{p.v}</span>
          </span>
        );
      })}
    </span>
  );
}

const SLOTS = [
  {id:"C",    label:"C",     fills:["C"]},
  {id:"1B",   label:"1B",    fills:["1B"]},
  {id:"2B",   label:"2B",    fills:["2B"]},
  {id:"SS",   label:"SS",    fills:["SS"]},
  {id:"3B",   label:"3B",    fills:["3B"]},
  {id:"MI",   label:"2B/SS", fills:["2B","SS"]},
  {id:"CI",   label:"1B/3B", fills:["1B","3B"]},
  {id:"OF1",  label:"OF",    fills:["OF"]},
  {id:"OF2",  label:"OF",    fills:["OF"]},
  {id:"OF3",  label:"OF",    fills:["OF"]},
  {id:"OF4",  label:"OF",    fills:["OF"]},
  {id:"UTIL", label:"UTIL",  fills:["C","1B","2B","SS","3B","OF","DH"]},
  {id:"SP1",  label:"SP",    fills:["SP"]},
  {id:"SP2",  label:"SP",    fills:["SP"]},
  {id:"SP3",  label:"SP",    fills:["SP"]},
  {id:"SP4",  label:"SP",    fills:["SP"]},
  {id:"SP5",  label:"SP",    fills:["SP"]},
  {id:"RP1",  label:"RP",    fills:["RP"]},
  {id:"RP2",  label:"RP",    fills:["RP"]},
  {id:"RP3",  label:"RP",    fills:["RP"]},
  {id:"BE1",  label:"BE",    fills:["C","1B","2B","SS","3B","OF","DH","SP","RP"]},
  {id:"BE2",  label:"BE",    fills:["C","1B","2B","SS","3B","OF","DH","SP","RP"]},
  {id:"BE3",  label:"BE",    fills:["C","1B","2B","SS","3B","OF","DH","SP","RP"]},
];

function fillRoster(myRoster) {
  const used = new Set();
  return SLOTS.map(slot => {
    const player = myRoster.find(p => !used.has(p.id) && p.cats.some(c => slot.fills.includes(c))) || null;
    if (player) used.add(player.id);
    return { ...slot, player };
  });
}

function App() {
  const [draftedIds, setDraftedIds] = useState(new Set());
  const [myPickIds,  setMyPickIds]  = useState(new Set());
  const [search,     setSearch]     = useState("");
  const [sortBy,     setSortBy]     = useState("rank"); // "rank" or "pts"
  const [posFilter,  setPosFilter]  = useState("ALL");
  const [tab,        setTab]        = useState("BOARD");
  const [numTeams,   setNumTeams]   = useState(7);
  const [myPick,     setMyPick]     = useState(2);
  const searchRef = useRef(null);

  const available = useMemo(() =>
    ALL_PLAYERS.filter(p => !draftedIds.has(p.id)),
    [draftedIds]
  );

  const filtered = useMemo(() => {
    let list = posFilter === "ALL" ? available : available.filter(p => p.cats.includes(posFilter));
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(p => p.name.toLowerCase().includes(q) || p.team.toLowerCase().includes(q));
    }
    list = [...list].sort((a,b) => sortBy === "pts" ? b.pts - a.pts : (a.ath_rank||999) - (b.ath_rank||999));
    return list;
  }, [available, posFilter, search, sortBy]);

  const myRoster = useMemo(() =>
    ALL_PLAYERS.filter(p => myPickIds.has(p.id)).sort((a,b) => b.pts - a.pts),
    [myPickIds]
  );

  const filledSlots = useMemo(() => fillRoster(myRoster), [myRoster]);

  const totalPicks  = draftedIds.size;
  const round       = Math.floor(totalPicks / numTeams) + 1;
  const pickInRound = (totalPicks % numTeams) + 1;
  const myPickNow   = round % 2 === 1 ? myPick : (numTeams - myPick + 1);
  const isMyTurn    = pickInRound === myPickNow;
  const picksUntil  = isMyTurn ? 0 : myPickNow - pickInRound;

  const rosterNeeds = useMemo(() => {
    const cnt = {C:0,"1B":0,"2B":0,SS:0,"3B":0,OF:0,DH:0,SP:0,RP:0};
    myRoster.forEach(p => p.cats.forEach(c => { if (c in cnt) cnt[c]++; }));
    const rosterSize = myRoster.length;
    const totalPitchers = cnt.SP + cnt.RP;
    const pitcherCapped = totalPitchers >= 8;
    const tooManyRP = cnt.RP >= 3;

    // Bench pitchers: any pitcher filling a BE slot
    const benchPitchers = rosterSize >= 16
      ? filledSlots.filter(s => s.id.startsWith("BE") && s.player && s.player.type === "PIT").length
      : 0;

    // Remaining rounds estimate (7 teams, 22 picks total)
    const picksLeft = 22 - rosterSize;
    const roundsLeft = Math.ceil(picksLeft / 1); // picks left for ME

    const needs = [];

    // ── Must-fill slots (hard requirements) ──────────────────────────────
    // Each of these positions has a dedicated slot that ONLY they fill
    if (cnt.C  < 1) needs.push({pos:"C",  urg:"high", why:"C-slot moet gevuld — pak catcher"});
    if (cnt.SS < 1) needs.push({pos:"SS", urg:"high", why:"SS-slot moet gevuld — pak shortstop"});
    if (cnt["1B"] < 1) needs.push({pos:"1B", urg:"high", why:"1B-slot moet gevuld"});
    if (cnt["3B"] < 1) needs.push({pos:"3B", urg:"high", why:"3B-slot moet gevuld"});
    if (cnt["2B"] < 1) needs.push({pos:"2B", urg:"high", why:"2B-slot moet gevuld"});

    // ── Flex slots: MI(2B/SS), CI(1B/3B), UTIL ───────────────────────────
    // Need at least 2 of 2B+SS total to cover both 2B and MI
    if (cnt["2B"] + cnt.SS < 2) needs.push({pos:"2B", urg:"med", why:"MI-slot (2B/SS) nog open"});
    if (cnt["2B"] + cnt.SS < 2) needs.push({pos:"SS", urg:"med", why:"MI-slot (2B/SS) nog open"});
    // Need at least 2 of 1B+3B total to cover both 1B and CI
    if (cnt["1B"] + cnt["3B"] < 2) needs.push({pos:"1B", urg:"med", why:"CI-slot (1B/3B) nog open"});
    if (cnt["1B"] + cnt["3B"] < 2) needs.push({pos:"3B", urg:"med", why:"CI-slot (1B/3B) nog open"});

    // ── OF: need 4 for OF1-OF4 ───────────────────────────────────────────
    if (cnt.OF < 4) needs.push({pos:"OF", urg: cnt.OF < 2 ? "high" : (cnt.OF < 3 ? "med" : "low"), why:(4-cnt.OF) + " OF-slots open"});
    if (cnt.OF < 4) needs.push({pos:"DH", urg: cnt.OF < 2 ? "high" : (cnt.OF < 3 ? "med" : "low"), why:(4-cnt.OF) + " OF-slots open (DH→UTIL)"});

    // ── Pitching ─────────────────────────────────────────────────────────
    if (cnt.SP < 5) needs.push({pos:"SP", urg: cnt.SP < 2 ? "high" : "med", why:"Nog " + (5-cnt.SP) + " SP nodig"});
    if (cnt.RP < 3) needs.push({pos:"RP", urg: cnt.RP < 1 ? "high" : "med", why:"Nog " + (3-cnt.RP) + " closers (SV=+5)"});

    return { needs, tooManyRP, benchPitchers, pitcherCapped, cnt, picksLeft };
  }, [myRoster, filledSlots]);

  // Scarcity: how many quality players remain per position
  const scarcity = useMemo(() => {
    const PTS_THRESHOLD = {C:280, SP:320, RP:250, "1B":300, "2B":280, SS:280, "3B":280, OF:300, DH:250};
    const result = {};
    ["C","SP","RP","1B","2B","SS","3B","OF","DH"].forEach(pos => {
      const avail = available.filter(p => p.cats.includes(pos) && p.pts >= (PTS_THRESHOLD[pos] || 280));
      result[pos] = avail.length;
    });
    return result;
  }, [available]);

  const advice = useMemo(() => {
    const { needs, tooManyRP, benchPitchers, cnt: rCnt, picksLeft } = rosterNeeds;
    const ub = {high:70, med:35, low:10};
    const nSP = myRoster.filter(p => p.cats.includes("SP")).length;
    const nRP = myRoster.filter(p => p.cats.includes("RP")).length;
    const nC  = myRoster.filter(p => p.cats.includes("C")).length;
    const nPIT = nSP + nRP;

    // SP quality: average pts of my starters
    const mySPs = myRoster.filter(p => p.cats.includes("SP"));
    const myRPs = myRoster.filter(p => p.cats.includes("RP"));
    const spAvg = mySPs.length > 0 ? mySPs.reduce((s,p) => s+p.pts, 0) / mySPs.length : 0;
    const rpAvg = myRPs.length > 0 ? myRPs.reduce((s,p) => s+p.pts, 0) / myRPs.length : 0;
    const hasEliteCloser = myRPs.some(p => p.pts >= 340 && p.stats.includes("SV"));
    const hasEliteSP     = mySPs.some(p => p.pts >= 430);
    const spWeak = nSP >= 2 && spAvg < 360;  // have SPs but avg is low
    const rpWeak = nRP >= 1 && rpAvg < 300;   // have RPs but no real closer

    return available.slice(0,100).map(p => {
      let bonus = 0, penalty = 0;
      const need = needs.find(n => p.cats.includes(n.pos));
      if (need) bonus = ub[need.urg] || 0;

      // ── Closer quality bonus ──────────────────────────────────────────────
      const isSV = p.cats.includes("RP") && p.stats.includes("SV");
      if (isSV) bonus += 40;
      // Extra boost for elite closer when we don't have one yet
      if (isSV && !hasEliteCloser && p.pts >= 340) bonus += 50;
      // If our RP is weak (low avg), upgrade bonus for better closer
      if (isSV && rpWeak && p.pts >= myRPs.reduce((best,r) => Math.max(best,r.pts),0)) bonus += 35;

      // ── SP quality bonus ─────────────────────────────────────────────────
      if (p.cats.includes("SP")) {
        // Boost elite SP if we don't have one yet
        if (!hasEliteSP && p.pts >= 430) bonus += 60;
        // Boost any SP that is better than our current worst SP
        const worstSP = mySPs.length > 0 ? Math.min(...mySPs.map(s => s.pts)) : 0;
        if (p.pts > worstSP + 40 && nSP >= 3) bonus += 25; // meaningful upgrade
        // Penalty for weak SP when better options exist
        if (p.pts < 320 && nSP >= 2) penalty += 30;
      }

      // ── Catcher ──────────────────────────────────────────────────────────
      if (p.cats.includes("C") && nC < 1) bonus += 30;

      // ── Caps ─────────────────────────────────────────────────────────────
      if (p.cats.includes("RP") && nRP >= 3) penalty = 200;
      if ((p.cats.includes("SP") || p.cats.includes("RP")) && nPIT >= 8) penalty = 300;

      // ── Bench full of pitchers ────────────────────────────────────────────
      if (p.type === "HIT" && benchPitchers >= 3) bonus += 50;

      // ── Round-aware SP/RP timing ──────────────────────────────────────────
      // SP: never in R1 (elite hitters only), penalty in R2, urgency from R5+
      if (p.cats.includes("SP") && round === 1) penalty = Math.max(penalty, 300);
      if (p.cats.includes("SP") && nSP === 0 && round === 2) penalty = Math.max(penalty, 80);
      if (p.cats.includes("SP") && nSP === 0 && round === 3) penalty = Math.max(penalty, 40);
      if (p.cats.includes("SP") && nSP === 0 && round >= 5)  bonus += 60;
      // RP: nooit in R1
      if (p.cats.includes("RP") && round === 1) penalty = Math.max(penalty, 300);
      // Urgency: als je posities nog niet gevuld hebt die moeten, boost die posities
      const unfilledUrgent = ["C","SS","1B","2B","3B"].filter(pos =>
        rCnt[pos] < 1 && p.cats.includes(pos)
      );
      if (unfilledUrgent.length > 0 && picksLeft <= 10) bonus += 80;
      if (unfilledUrgent.length > 0 && picksLeft <= 5)  bonus += 120;

      const rpCapped    = p.cats.includes("RP") && nRP >= 3;
      const pitCapped   = nPIT >= 8 && (p.cats.includes("SP") || p.cats.includes("RP"));
      const benchBoost  = p.type === "HIT" && benchPitchers >= 3;
      const eliteSPBoost = p.cats.includes("SP") && !hasEliteSP && p.pts >= 430;
      const eliteRPBoost = isSV && !hasEliteCloser && p.pts >= 340;
      const qualityUpgrade = p.cats.includes("SP") && nSP >= 3 && p.pts > (mySPs.length > 0 ? Math.min(...mySPs.map(s => s.pts)) : 0) + 40;

      // Scarcity label for primary position
      const pos0 = p.cats[0];
      const rem  = scarcity[pos0] || 0;
      const scarcityLabel = rem <= 3 ? "KRITIEK SCHAARS" : rem <= 6 ? "schaars" : rem <= 12 ? "beperkt" : null;
      const scarcityColor = rem <= 3 ? "#e05c5c" : rem <= 6 ? "#ffc107" : "#8aaa98";

      // Quality context label shown on card
      let qualityNote = "";
      if (eliteSPBoost)    qualityNote = "elite SP — jij hebt er nog geen";
      else if (eliteRPBoost) qualityNote = "elite closer — jij hebt er nog geen";
      else if (qualityUpgrade) qualityNote = "upgrade op je zwakste SP";
      else if (spWeak && p.cats.includes("SP") && p.pts > spAvg + 30) qualityNote = "SP rotatie versterken (gem. " + Math.round(spAvg) + " pts)";
      else if (rpWeak && isSV && p.pts > rpAvg + 20) qualityNote = "closer upgrade (gem. " + Math.round(rpAvg) + " pts)";
      // R1 context: top 3 hitters are within 5 pts — note TB difference
      const s = p.statobj || {};
      if (!qualityNote && round === 1 && p.type === "HIT" && (p.vorp||0) >= 220) {
        const tb = s.TB || 0;
        if (tb >= 315) qualityNote = "meeste TB (" + tb + ") — sterkste power scorer";
        else if (tb >= 280 && (s.BB||0) >= 110) qualityNote = "hoog BB/OBP profiel — lage TB (" + tb + ")";
      }

      // Use VORP as base score — reflects positional scarcity for 7-team league
      // Tiebreaker: TB for hitters (biggest single contributor), K for pitchers
      // Score based on Athletic VORP (SD-adjusted, position-corrected consensus)
      const vorpBase = (p.ath_vorp || p.vorp || 0) * 18;
      return { ...p, score: vorpBase + bonus - penalty, bonus, penalty,
               needWhy: need ? need.why : "", rpCapped, pitCapped, benchBoost,
               eliteSPBoost, eliteRPBoost, qualityUpgrade, qualityNote,
               rem, scarcityLabel, scarcityColor };
    }).sort((a,b) => b.score - a.score).slice(0,5);
  }, [available, rosterNeeds, myRoster, round, scarcity]);

  const markDrafted = useCallback((id, mine) => {
    setDraftedIds(prev => new Set([...prev, id]));
    if (mine) setMyPickIds(prev => new Set([...prev, id]));
    setSearch("");
    if (searchRef.current) searchRef.current.focus();
  }, []);

  const undoLast = useCallback(() => {
    const arr = Array.from(draftedIds);
    if (!arr.length) return;
    const last = arr[arr.length - 1];
    setDraftedIds(prev => { const n = new Set(prev); n.delete(last); return n; });
    setMyPickIds( prev => { const n = new Set(prev); n.delete(last); return n; });
  }, [draftedIds]);

  const urgColor = u => u === "high" ? "#e05c5c" : u === "med" ? "#ffc107" : "#5cb87a";
  const slotCol  = label => {
    if (label === "BE")    return "#243228";
    if (label === "UTIL")  return "#b0b0b0";
    if (label === "2B/SS") return "#c07ae8";
    if (label === "1B/3B") return "#a0e87a";
    return PC[label] || "#555";
  };

  return (
    <div style={{minHeight:"100vh",background:"#111e1a",display:"flex",justifyContent:"center",alignItems:"flex-start",padding:"0"}}>
      <div style={{width:"100%",maxWidth:"1300px",height:"100vh",background:"#2e403a",color:"#f4f0e4",display:"flex",flexDirection:"column",overflow:"hidden",boxShadow:"0 0 60px rgba(0,0,0,0.8)"}}>

        <div style={{background:"#111e1a",borderBottom:"3px solid #5a7868",padding:"12px 20px",display:"flex",alignItems:"center",gap:"16px",flexShrink:"0"}}>
          <div>
            <div style={{fontSize:"9px",letterSpacing:"4px",color:"#c8d8c8",fontFamily:"Share Tech Mono, monospace"}}>{"⚾  LIVE DRAFT  ·  " + numTeams + " TEAMS  ·  PICK #" + myPick + "  ·  MAX 8 PITCHERS  ·  1100 IP"}</div>
            <div style={{fontSize:"20px",color:"#f8f4ec",fontFamily:"Oswald, sans-serif",fontWeight:"700",letterSpacing:"2px",textTransform:"uppercase"}}>Aaron Dodgers</div>
          </div>
          <div style={{display:"flex",gap:"12px",alignItems:"center",marginLeft:"16px"}}>
            <div style={{display:"flex",flexDirection:"column",gap:"3px"}}>
              <label style={{fontSize:"8px",color:"#c8d8c8",fontFamily:"Share Tech Mono, monospace",letterSpacing:"2px"}}>TEAMS</label>
              <select value={numTeams} onChange={e => { setNumTeams(parseInt(e.target.value)); setDraftedIds(new Set()); setMyPickIds(new Set()); }} style={{background:"#111e1a",border:"2px solid #8aaa98",color:"#f4f0e4",fontFamily:"Oswald, sans-serif",fontSize:"13px",fontWeight:"600",padding:"4px 8px",borderRadius:"0px",cursor:"pointer",outline:"none"}}>
                {[6,7,8,9,10,12,14].map(n => <option key={n} value={n}>{n}</option>)}
              </select>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:"3px"}}>
              <label style={{fontSize:"8px",color:"#c8d8c8",fontFamily:"Share Tech Mono, monospace",letterSpacing:"2px"}}>MIJN PICK</label>
              <select value={myPick} onChange={e => { setMyPick(parseInt(e.target.value)); setDraftedIds(new Set()); setMyPickIds(new Set()); }} style={{background:"#111e1a",border:"2px solid #8aaa98",color:"#f4f0e4",fontFamily:"Oswald, sans-serif",fontSize:"13px",fontWeight:"600",padding:"4px 8px",borderRadius:"0px",cursor:"pointer",outline:"none"}}>
                {Array.from({length: numTeams}, (_,i) => i+1).map(n => <option key={n} value={n}>#{n}</option>)}
              </select>
            </div>
          </div>
          <div style={{display:"flex",gap:"8px",marginLeft:"auto",alignItems:"center"}}>
            <div style={{background: isMyTurn ? "#1e3828" : "#111e1a", border: isMyTurn ? "2px solid #5cb87a" : "1px solid #2a3a30", borderRadius:"6px",padding:"6px 12px",textAlign:"center"}}>
              <div style={{fontSize:"8px",color: isMyTurn ? "#f8f4ec" : "#a0b8a8",fontFamily:"Share Tech Mono, monospace",letterSpacing:"2px"}}>
                {isMyTurn ? "JOUW BEURT" : "NOG " + picksUntil + " PICKS"}
              </div>
              <div style={{fontSize:"16px",color:"#f8f4ec",fontFamily:"Oswald, sans-serif",fontWeight:"700",letterSpacing:"1px"}}>R{round} P{pickInRound}/{numTeams}</div>
            </div>
            <div style={{background:"#111e1a",border:"2px solid #4a6a5a",borderRadius:"0px",padding:"6px 12px",textAlign:"center"}}>
              <div style={{fontSize:"8px",color:"#c8d8c8",fontFamily:"Share Tech Mono, monospace",letterSpacing:"2px"}}>GEDRAFT</div>
              <div style={{fontSize:"16px",color:"#f8f4ec",fontFamily:"Oswald, sans-serif",fontWeight:"700",letterSpacing:"1px"}}>{draftedIds.size}</div>
            </div>
            <button onClick={undoLast} style={{background:"rgba(180,60,40,0.2)",border:"2px solid rgba(200,80,40,0.5)",color:"#e07c5c",padding:"6px 12px",borderRadius:"6px",fontSize:"11px",fontFamily:"monospace",cursor:"pointer"}}>
              UNDO
            </button>
          </div>
        </div>

        <div style={{display:"flex",borderBottom:"3px solid #5a7868",flexShrink:"0",background:"#111e1a"}}>
          {[["BOARD","Draft Board"],["ADVICE","Advies"],["MYROSTER","Mijn Roster"]].map(([key, label]) => (
            <button key={key} onClick={() => setTab(key)} style={{
              background: tab === key ? "#253830" : "transparent",
              color: tab === key ? "#f0ede0" : "#8aaa90",
              border: "none",
              borderBottom: tab === key ? "3px solid #f0ede0" : "3px solid transparent",
              padding:"11px 20px",fontSize:"13px",fontFamily:"Oswald, sans-serif",fontWeight:"600",cursor:"pointer",letterSpacing:"2px",textTransform:"uppercase"
            }}>
              {label}
            </button>
          ))}
        </div>

        <div style={{flex:"1",overflow:"hidden",display:"flex"}}>

          {tab === "BOARD" && (
            <div style={{flex:"1",display:"flex",flexDirection:"column",overflow:"hidden"}}>
              <div style={{padding:"10px 16px",borderBottom:"1px solid #2a3e38",display:"flex",gap:"8px",flexWrap:"wrap",alignItems:"center",background:"#141e18",flexShrink:"0"}}>
                <input
                  ref={searchRef}
                  value={search}
                  onChange={e => setSearch(e.target.value)}
                  placeholder="Zoek speler..."
                  autoFocus
                  style={{background:"#111e1a",border:"2px solid #8aaa98",color:"#f4f0e4",padding:"7px 13px",borderRadius:"0px",fontSize:"12px",fontFamily:"monospace",width:"210px",outline:"none"}}
                />
                <div style={{display:"flex",gap:"4px",marginLeft:"auto",alignItems:"center"}}>
                  <span style={{fontSize:"8px",color:"#8aaa98",fontFamily:"Share Tech Mono, monospace",letterSpacing:"1px"}}>SORT:</span>
                  {["rank","pts"].map(s => (
                    <button key={s} onClick={() => setSortBy(s)} style={{
                      background: sortBy===s ? "rgba(240,240,220,0.12)" : "transparent",
                      border: sortBy===s ? "2px solid #a0b898" : "2px solid #3a5a4a",
                      color: sortBy===s ? "#f4f0e4" : "#6a8a78",
                      padding:"3px 10px",fontSize:"10px",fontFamily:"Oswald, sans-serif",
                      fontWeight:"600",cursor:"pointer",letterSpacing:"1px",textTransform:"uppercase"
                    }}>{s === "rank" ? "VORP" : "PTS"}</button>
                  ))}
                </div>
                <div style={{display:"flex",gap:"2px",flexWrap:"wrap"}}>
                  {["ALL","SP","RP","C","1B","2B","SS","3B","OF","DH"].map(pos => {
                    const active = posFilter === pos;
                    const col = pos === "ALL" ? "#5a9a7a" : (PC[pos] || "#5a9a7a");
                    return (
                      <button key={pos} onClick={() => setPosFilter(pos)} style={{
                        background: active ? col+"22" : "transparent",
                        color: active ? col : "#4a7060",
                        border: active ? "1px solid "+col+"55" : "1px solid #1a2820",
                        padding:"3px 10px",borderRadius:"0px",fontSize:"11px",fontFamily:"Oswald, sans-serif",fontWeight:"600",cursor:"pointer",letterSpacing:"1px"
                      }}>
                        {pos}
                      </button>
                    );
                  })}
                </div>
                <span style={{fontSize:"10px",color:"#2a4a3a",fontFamily:"monospace",marginLeft:"auto"}}>{filtered.length} beschikbaar</span>
              </div>

              <div style={{display:"grid",gridTemplateColumns:"60px 220px 70px 1fr 130px",gap:"0",padding:"6px 16px",borderBottom:"1px solid #2a3e38",background:"rgba(255,255,255,0.02)",flexShrink:"0"}}>
                {["PTS/V","NAAM","POS","STATS","ACTIE"].map(h => (
                  <span key={h} style={{fontSize:"9px",color:"#c8d8c8",fontFamily:"Share Tech Mono, monospace",letterSpacing:"1.5px"}}>{h}</span>
                ))}
              </div>

              <div style={{flex:"1",overflowY:"auto"}}>
                {filtered.slice(0,120).map((p, i) => (
                  <div key={p.id} style={{
                    display:"grid",gridTemplateColumns:"60px 220px 70px 1fr 130px",
                    alignItems:"center",padding:"9px 16px",gap:"4px",
                    background: i%2===0 ? "#283c36" : "#223430",
                    borderBottom:"1px solid #1a2e28"
                  }}>
                    <PtsBadge pts={p.pts} vorp={p.ath_vorp} />
                    <div>
                      <div style={{fontSize:"13px",color:"#f4f0e4",fontWeight:"500"}}>{p.name}</div>
                      <div style={{fontSize:"10px",color:"#4a7060",fontFamily:"monospace"}}>{p.team}</div>
                    </div>
                    <PosBadge cats={p.cats} />
                    <StatPills statobj={p.statobj} type={p.type} />
                    <div style={{display:"flex",gap:"3px"}}>
                      <button onClick={() => markDrafted(p.id, true)} style={{background:"rgba(92,184,122,0.15)",border:"1px solid rgba(92,184,122,0.4)",color:"#5cb87a",padding:"5px 10px",borderRadius:"4px",fontSize:"10px",fontFamily:"monospace",cursor:"pointer",whiteSpace:"nowrap",letterSpacing:"0.5px"}}>
                        + Draft
                      </button>
                      <button onClick={() => markDrafted(p.id, false)} style={{background:"rgba(180,60,40,0.2)",border:"2px solid rgba(200,80,40,0.5)",color:"#e07c5c",padding:"4px 8px",borderRadius:"3px",fontSize:"10px",fontFamily:"monospace",cursor:"pointer"}}>
                        X
                      </button>
                    </div>
                  </div>
                ))}
                {filtered.length > 120 && (
                  <div style={{padding:"10px",textAlign:"center",fontSize:"10px",color:"#2a4a3a",fontFamily:"monospace"}}>
                    +{filtered.length - 120} meer — gebruik filter
                  </div>
                )}
              </div>
            </div>
          )}

          {tab === "ADVICE" && (
            <div style={{flex:"1",overflowY:"auto",padding:"16px"}}>
              {isMyTurn && (
                <div style={{background:"rgba(92,184,122,0.12)",border:"1px solid #5cb87a",borderRadius:"8px",padding:"12px 16px",marginBottom:"16px"}}>
                  <div style={{fontSize:"12px",color:"#5cb87a",fontFamily:"monospace"}}>{"JOUW BEURT — RONDE " + round}</div>
                  <div style={{fontSize:"11px",color:"#a0b8a8"}}>Pak een van de aanbevolen spelers</div>
                </div>
              )}
              {rosterNeeds.pitcherCapped && (
                <div style={{background:"rgba(224,92,92,0.08)",border:"1px solid rgba(224,92,92,0.4)",borderRadius:"8px",padding:"10px 14px",marginBottom:"12px",display:"flex",alignItems:"center",gap:"10px"}}>
                  <span style={{fontSize:"16px"}}>{"\u26d4"}</span>
                  <div>
                    <div style={{fontSize:"11px",color:"#e05c5c",fontFamily:"monospace",fontWeight:"bold"}}>MAX 8 PITCHERS BEREIKT</div>
                    <div style={{fontSize:"10px",color:"#8a5a5a"}}>Alleen nog hitters — max 8 pitchers per roster</div>
                  </div>
                </div>
              )}
              {rosterNeeds.tooManyRP && (
                <div style={{background:"rgba(255,193,7,0.08)",border:"1px solid rgba(255,193,7,0.4)",borderRadius:"8px",padding:"10px 14px",marginBottom:"12px",display:"flex",alignItems:"center",gap:"10px"}}>
                  <span style={{fontSize:"16px"}}>{"\u26a0\ufe0f"}</span>
                  <div>
                    <div style={{fontSize:"11px",color:"#ffc107",fontFamily:"monospace",fontWeight:"bold"}}>3 CLOSERS GENOEG</div>
                    <div style={{fontSize:"10px",color:"#a0b8a8"}}>Bench slots beter besteed aan hitters</div>
                  </div>
                </div>
              )}
              {rosterNeeds.benchPitchers >= 3 && (
                <div style={{background:"rgba(224,92,92,0.08)",border:"1px solid rgba(224,92,92,0.3)",borderRadius:"8px",padding:"10px 14px",marginBottom:"12px",display:"flex",alignItems:"center",gap:"10px"}}>
                  <span style={{fontSize:"16px"}}>{"\u26be"}</span>
                  <div>
                    <div style={{fontSize:"11px",color:"#e05c5c",fontFamily:"monospace",fontWeight:"bold"}}>BENCH VOL MET PITCHERS</div>
                    <div style={{fontSize:"10px",color:"#8a5a5a"}}>Pak hitters — advies boost actief</div>
                  </div>
                </div>
              )}
              {rosterNeeds.needs.length > 0 && (
                <div style={{marginBottom:"16px"}}>
                  <div style={{fontSize:"9px",color:"#f4f0e4",fontFamily:"Share Tech Mono, monospace",marginBottom:"8px",letterSpacing:"2px"}}>ROSTER BEHOEFTEN</div>
                  <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                    {rosterNeeds.needs.map(n => (
                      <div key={n.pos} style={{background:"#1a2e28",border:"1px solid "+urgColor(n.urg)+"66",borderRadius:"6px",padding:"6px 10px"}}>
                        <div style={{fontSize:"12px",color:urgColor(n.urg),fontFamily:"monospace",fontWeight:"bold"}}>{n.pos}</div>
                        <div style={{fontSize:"10px",color:"#6a8a78"}}>{n.why}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              <div style={{fontSize:"9px",color:"#f4f0e4",fontFamily:"Share Tech Mono, monospace",marginBottom:"10px",letterSpacing:"2px"}}>TOP AANBEVELINGEN</div>
              {advice.map((p, i) => {
                const medals = ["★","▲","●","·","·"];
                const mCol   = ["#f0ede0","#d8d4c8","#C8C0B0","#555","#555"];
                return (
                  <div key={p.id} style={{background: i===0 ? "#2a3c30" : "#1e3028", border: i===0 ? "2px solid rgba(255,215,0,0.3)" : "1px solid #1a2820", borderRadius:"10px",padding:"14px 18px",marginBottom:"10px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"6px"}}>
                      <span style={{fontSize:"18px",color:mCol[i]}}>{medals[i]}</span>
                      <span style={{fontSize:"15px",color:"#f4f0e4",fontWeight:"500",flex:"1"}}>{p.name}</span>
                      <span style={{fontSize:"10px",fontFamily:"monospace",color:pCol(p.cats)}}>{p.team}</span>
                      <PosBadge cats={p.cats} />
                      <PtsBadge pts={p.pts} vorp={p.ath_vorp} />
                      <button onClick={() => { markDrafted(p.id, true); setTab("BOARD"); }} style={{background:"rgba(92,184,122,0.15)",border:"1px solid rgba(92,184,122,0.4)",color:"#5cb87a",padding:"5px 10px",borderRadius:"4px",fontSize:"10px",fontFamily:"monospace",cursor:"pointer"}}>
                        + Pak
                      </button>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:"10px",marginTop:"6px",flexWrap:"wrap"}}>
                      <StatPills statobj={p.statobj} type={p.type} />
                      {p.scarcityLabel && (
                        <span style={{fontSize:"9px",fontFamily:"monospace",color:p.scarcityColor,background:p.scarcityColor+"18",border:"1px solid "+p.scarcityColor+"44",padding:"2px 7px",borderRadius:"3px",letterSpacing:"1px"}}>
                          {p.scarcityLabel + " (" + p.rem + " over)"}
                        </span>
                      )}
                    </div>
                    {p.qualityNote && (
                      <div style={{fontSize:"10px",color:"#f8f4ec",marginTop:"4px",fontWeight:"bold"}}>{"★ " + p.qualityNote}</div>
                    )}
                    {p.benchBoost && (
                      <div style={{fontSize:"10px",color:"#7ab0a0",marginTop:"4px"}}>{"hitter bonus — bench heeft genoeg pitchers"}</div>
                    )}
                    {p.bonus > 0 && !p.benchBoost && !p.qualityNote && (
                      <div style={{fontSize:"10px",color:"#5cb87a",marginTop:"4px"}}>{"+" + p.bonus + " bonus — " + (p.needWhy || "hoge waarde")}</div>
                    )}
                    {p.pitCapped && (
                      <div style={{fontSize:"10px",color:"#e05c5c",marginTop:"3px"}}>{"max 8 pitchers bereikt — niet aanbevolen"}</div>
                    )}
                    {p.rpCapped && !p.pitCapped && (
                      <div style={{fontSize:"10px",color:"#ffc107",marginTop:"3px"}}>{"3 closers al — niet aanbevolen"}</div>
                    )}
                    {p.penalty > 0 && !p.rpCapped && !p.pitCapped && (
                      <div style={{fontSize:"10px",color:"#e07a5a",marginTop:"3px"}}>{"Te vroeg voor deze positie (ronde " + round + ")"}</div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {tab === "MYROSTER" && (
            <div style={{flex:"1",overflowY:"auto",padding:"14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
                <div style={{fontSize:"9px",color:"#f4f0e4",fontFamily:"Share Tech Mono, monospace",letterSpacing:"3px"}}>{"MIJN ROSTER — " + myRoster.length + "/22"}</div>
                <div style={{display:"flex",gap:"10px",alignItems:"center"}}>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:"8px",color:"#3a6a58",fontFamily:"monospace"}}>TOTAAL</div>
                    <div style={{fontSize:"12px",color:"#f8f4ec",fontFamily:"Share Tech Mono, monospace"}}>{"~" + myRoster.reduce((s,p) => s+p.pts, 0).toLocaleString() + " pts"}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:"8px",color:"#3a6a58",fontFamily:"monospace"}}>BENCH</div>
                    {(() => { const bpts = filledSlots.filter(s => s.id.startsWith("BE") && s.player).reduce((sum,s) => sum+s.player.pts, 0); const bc = bpts >= 1400 ? "#5cb87a" : bpts >= 1000 ? "#ffc107" : "#e05c5c"; return <div style={{fontSize:"12px",color:bc,fontFamily:"monospace"}}>{"~" + bpts.toLocaleString() + " pts"}</div>; })()}
                  </div>
                </div>
              </div>
              {filledSlots.map(slot => {
                const sc = slotCol(slot.label);
                const empty = !slot.player;
                return (
                  <div key={slot.id} style={{
                    display:"grid",gridTemplateColumns:"64px 1fr",
                    alignItems:"center",marginBottom:"3px",
                    background: empty ? "#1a2820" : "#223830",
                    border: empty ? "1px solid #1a2820" : "1px solid "+sc+"30",
                    borderLeft: "3px solid "+sc+(empty ? "35" : "90"),
                    borderRadius:"6px",padding:"8px 14px",minHeight:"42px"
                  }}>
                    <span style={{fontSize:"10px",fontFamily:"monospace",color:sc}}>{slot.label}</span>
                    {empty ? (
                      <span style={{fontSize:"11px",color:"#1e2e28",fontStyle:"italic"}}>leeg</span>
                    ) : (
                      <div>
                        <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"3px"}}>
                          <span style={{fontSize:"13px",color:"#f4f0e4",fontWeight:"500"}}>{slot.player.name}</span>
                          <span style={{fontSize:"10px",fontFamily:"monospace",color:pCol(slot.player.cats)}}>{slot.player.team}</span>
                          <PosBadge cats={slot.player.cats} />
                          <PtsBadge pts={slot.player.pts} />
                        </div>
                        <StatPills statobj={slot.player.statobj} type={slot.player.type} />
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

        </div>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
