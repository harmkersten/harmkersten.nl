    </span>
  );
}

function PosBadge({ cats }) {
  if (!cats || !cats.length) return null;
  return (
    <span style={{display:"inline-flex",gap:"3px"}}>
      {cats.slice(0,2).map(c => {
        const col = PC[c] || "#888";
        return (
          <span key={c} style={{fontSize:"9px",fontFamily:"monospace",color:col,background:col+"18",border:"1px solid "+col+"40",padding:"1px 5px",borderRadius:"2px"}}>
            {c}
          </span>
        );
      })}
    </span>
  );
}

function StatPills({ statsStr, type }) {
  const pills = [];
  if (type === "HIT") {
    const rM   = statsStr.match(/R(\d+)/);
    const hrM  = statsStr.match(/HR(\d+)/);
    const rbiM = statsStr.match(/RBI(\d+)/);
    const sbM  = statsStr.match(/SB(\d+)/);
    const avgM = statsStr.match(/(\.\d+)/);
    if (rM)   pills.push({ k:"R",   v:rM[1],   hi: parseInt(rM[1])    >= 90 });
    if (hrM)  pills.push({ k:"HR",  v:hrM[1],  hi: parseInt(hrM[1])   >= 25 });
    if (rbiM) pills.push({ k:"RBI", v:rbiM[1], hi: parseInt(rbiM[1])  >= 85 });
    if (sbM)  pills.push({ k:"SB",  v:sbM[1],  hi: parseInt(sbM[1])   >= 20 });
    if (avgM) pills.push({ k:"AVG", v:avgM[1], hi: parseFloat(avgM[1])>= 0.280 });
  } else {
    const ipM  = statsStr.match(/(\d+)IP/);
    const kM   = statsStr.match(/(\d+)K/);
    const wM   = statsStr.match(/(\d+)W/);
    const svM  = statsStr.match(/(\d+)SV/);
    const eraM = statsStr.match(/([\d.]+)ERA/);
    if (ipM)  pills.push({ k:"IP",  v:ipM[1],  hi: parseInt(ipM[1])    >= 170 });
    if (kM)   pills.push({ k:"K",   v:kM[1],   hi: parseInt(kM[1])     >= 180 });
    if (wM)   pills.push({ k:"W",   v:wM[1],   hi: parseInt(wM[1])     >= 12  });
    if (svM)  pills.push({ k:"SV",  v:svM[1],  hi: parseInt(svM[1])    >= 25  });
    if (eraM) pills.push({ k:"ERA", v:eraM[1], hi: parseFloat(eraM[1]) <= 3.40 });
  }
  return (
    <span style={{display:"inline-flex",gap:"3px",flexWrap:"wrap"}}>
      {pills.map(p => {
        const bg  = p.hi ? "rgba(255,255,255,0.07)" : "rgba(255,255,255,0.02)";
        const bd  = p.hi ? "1px solid rgba(255,255,255,0.15)" : "1px solid rgba(255,255,255,0.04)";
        const kc  = p.hi ? "#a0b8c8" : "#3a5060";
        const vc  = p.hi ? "#f0e8d8" : "#6a7a88";
        const fw  = p.hi ? "600" : "400";
        return (
          <span key={p.k} style={{display:"inline-flex",flexDirection:"column",alignItems:"center",background:bg,border:bd,borderRadius:"3px",padding:"1px 5px",minWidth:"28px"}}>
            <span style={{fontSize:"8px",color:kc,fontFamily:"monospace",lineHeight:"1.2"}}>{p.k}</span>
            <span style={{fontSize:"11px",color:vc,fontFamily:"monospace",fontWeight:fw,lineHeight:"1.2"}}>{p.v}</span>
          </span>
        );
      })}
    </span>
  );
}

  {id:"C",    label:"C",     fills:["C"]},
  {id:"1B",   label:"1B",    fills:["1B"]},
  {id:"2B",   label:"2B",    fills:["2B"]},

  {id:"OF1",  label:"OF",    fills:["OF"]},
  {id:"OF2",  label:"OF",    fills:["OF"]},
  {id:"OF3",  label:"OF",    fills:["OF"]},
  {id:"OF4",  label:"OF",    fills:["OF"]},
  {id:"UTIL", label:"UTIL",  fills:["C","1B","2B","SS","3B","OF","DH"]},
  {id:"SP1",  label:"SP",    fills:["SP"]},
  {id:"SP2",  label:"SP",    fills:["SP"]},
  {id:"SP3",  label:"SP",    fills:["SP"]},
  {id:"SP4",  label:"SP",    fills:["SP"]},
  {id:"SP5",  label:"SP",    fills:["SP"]},
  {id:"RP1",  label:"RP",    fills:["RP"]},
  {id:"RP2",  label:"RP",    fills:["RP"]},
  {id:"RP3",  label:"RP",    fills:["RP"]},
  {id:"BE1",  label:"BE",    fills:["C","1B","2B","SS","3B","OF","DH","SP","RP"]},
  {id:"BE2",  label:"BE",    fills:["C","1B","2B","SS","3B","OF","DH","SP","RP"]},
  {id:"BE3",  label:"BE",    fills:["C","1B","2B","SS","3B","OF","DH","SP","RP"]},
  {id:"BE4",  label:"BE",    fills:["C","1B","2B","SS","3B","OF","DH","SP","RP"]},
  {id:"BE5",  label:"BE",    fills:["C","1B","2B","SS","3B","OF","DH","SP","RP"]},
];

function fillRoster(myRoster) {
  const used = new Set();
  return SLOTS.map(slot => {
    const player = myRoster.find(p => !used.has(p.id) && p.cats.some(c => slot.fills.includes(c))) || null;
    if (player) used.add(player.id);
    return { ...slot, player };
  });
}

function App() {
  const [draftedIds, setDraftedIds] = useState(new Set());
  const [myPickIds,  setMyPickIds]  = useState(new Set());
  const [search,     setSearch]     = useState("");
  const [posFilter,  setPosFilter]  = useState("ALL");
  const [tab,        setTab]        = useState("BOARD");
  const [numTeams,   setNumTeams]   = useState(8);
  const [myPick,     setMyPick]     = useState(4);
  const searchRef = useRef(null);

  const available = useMemo(() =>
    ALL_PLAYERS.filter(p => !draftedIds.has(p.id)),
    [draftedIds]
  );

  const filtered = useMemo(() => {
    let list = posFilter === "ALL" ? available : available.filter(p => p.cats.includes(posFilter));
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(p => p.name.toLowerCase().includes(q) || p.team.toLowerCase().includes(q));
    }
    return list;
  }, [available, posFilter, search]);

  const myRoster = useMemo(() =>
    ALL_PLAYERS.filter(p => myPickIds.has(p.id)).sort((a,b) => b.pts - a.pts),
    [myPickIds]
  );

  const filledSlots = useMemo(() => fillRoster(myRoster), [myRoster]);

  const totalPicks  = draftedIds.size;
  const round       = Math.floor(totalPicks / numTeams) + 1;
  const pickInRound = (totalPicks % numTeams) + 1;
  const myPickNow   = round % 2 === 1 ? myPick : (numTeams - myPick + 1);
  const isMyTurn    = pickInRound === myPickNow;
  const picksUntil  = isMyTurn ? 0 : myPickNow - pickInRound;

  const rosterNeeds = useMemo(() => {
    const cnt = {C:0,"1B":0,"2B":0,SS:0,"3B":0,OF:0,SP:0,RP:0};
    myRoster.forEach(p => p.cats.forEach(c => { if (c in cnt) cnt[c]++; }));
    const tooManyRP = cnt.RP >= 3;
    // Only warn about bench pitchers once roster is 18+ deep (bench slots filling up)
    const rosterSize = myRoster.length;
    const benchPitchers = rosterSize >= 18
      ? filledSlots.filter(s => s.id.startsWith("BE") && s.player && s.player.type === "PIT").length
      : 0;
    const needs = [];
    if (cnt.C < 1)  needs.push({pos:"C",  urg:"high", why:"Geen catcher"});
    if (cnt["2B"] < 2) needs.push({pos:"2B", urg:"med", why:"2B slots open"});
    if (cnt["3B"] < 2) needs.push({pos:"3B", urg:"med", why:"3B slots open"});
    if (cnt.SP < 4) needs.push({pos:"SP", urg: cnt.SP < 2 ? "high" : "med", why:"Nog " + (4-cnt.SP) + " SP nodig"});
    if (cnt.RP < 2) needs.push({pos:"RP", urg: cnt.RP < 1 ? "high" : "med", why:"Closers SV=+5, pak " + (2-cnt.RP) + " meer"});
    if (cnt.OF < 4) needs.push({pos:"OF", urg:"low", why:(4-cnt.OF) + " OF slots open"});
    return { needs, tooManyRP, benchPitchers };
  }, [myRoster, filledSlots]);

  // Scarcity: how many quality players remain per position
  const scarcity = useMemo(() => {
    const PTS_THRESHOLD = {C:280, SP:320, RP:250, "1B":300, "2B":280, SS:280, "3B":280, OF:300, DH:250};
    const result = {};
    ["C","SP","RP","1B","2B","SS","3B","OF","DH"].forEach(pos => {
      const avail = available.filter(p => p.cats.includes(pos) && p.pts >= (PTS_THRESHOLD[pos] || 280));
      result[pos] = avail.length;
    });
    return result;
  }, [available]);

  const advice = useMemo(() => {
    const { needs, tooManyRP, benchPitchers } = rosterNeeds;
    const ub = {high:70, med:35, low:10};
    const nSP = myRoster.filter(p => p.cats.includes("SP")).length;
    const nRP = myRoster.filter(p => p.cats.includes("RP")).length;
    const nC  = myRoster.filter(p => p.cats.includes("C")).length;
    return available.slice(0,100).map(p => {
      let bonus = 0, penalty = 0;
      const need = needs.find(n => p.cats.includes(n.pos));
      if (need) bonus = ub[need.urg] || 0;
      if (p.cats.includes("RP") && p.stats.includes("SV")) bonus += 40;
      if (p.cats.includes("C") && nC < 1) bonus += 30;
      if (p.cats.includes("RP") && nRP >= 3) penalty = 200;
      if (p.type === "HIT" && benchPitchers >= 3) bonus += 50;
      if (p.cats.includes("SP") && nSP === 0 && round <= 2) penalty = 120;
      if (p.cats.includes("SP") && nSP === 0 && round === 3) penalty = 50;
      if (p.cats.includes("SP") && nSP === 0 && round >= 5) bonus += 60;
      if (p.cats.includes("RP") && round === 1) penalty = 150;
      const rpCapped   = p.cats.includes("RP") && nRP >= 3;
      const benchBoost = p.type === "HIT" && benchPitchers >= 3;
      // Scarcity label for primary position
      const pos0 = p.cats[0];
      const rem  = scarcity[pos0] || 0;
      const scarcityLabel = rem <= 3 ? "KRITIEK SCHAARS" : rem <= 6 ? "schaars" : rem <= 12 ? "beperkt" : null;
      const scarcityColor = rem <= 3 ? "#e05c5c" : rem <= 6 ? "#ffc107" : "#8ab8a0";
      return { ...p, score: p.pts + bonus - penalty, bonus, penalty, needWhy: need ? need.why : "", rpCapped, benchBoost, rem, scarcityLabel, scarcityColor };
    }).sort((a,b) => b.score - a.score).slice(0,5);
  }, [available, rosterNeeds, myRoster, round, scarcity]);

  const markDrafted = useCallback((id, mine) => {

  return (

                const mCol   = ["#FFD700","#C0C0C0","#CD7F32","#555","#555"];
                return (
                  <div key={p.id} style={{background: i===0 ? "rgba(255,215,0,0.06)" : "rgba(255,255,255,0.02)", border: i===0 ? "1px solid rgba(255,215,0,0.3)" : "1px solid #1a2a3a", borderRadius:"10px",padding:"14px 18px",marginBottom:"10px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"6px"}}>
                      <span style={{fontSize:"18px",color:mCol[i]}}>{medals[i]}</span>
                      <span style={{fontSize:"15px",color:"#f0e8d8",fontWeight:"500",flex:"1"}}>{p.name}</span>
                      <span style={{fontSize:"10px",fontFamily:"monospace",color:pCol(p.cats)}}>{p.team}</span>
                      <PosBadge cats={p.cats} />
                      <PtsBadge pts={p.pts} />
                      <button onClick={() => { markDrafted(p.id, true); setTab("BOARD"); }} style={{background:"rgba(92,184,122,0.15)",border:"1px solid rgba(92,184,122,0.4)",color:"#5cb87a",padding:"5px 10px",borderRadius:"4px",fontSize:"10px",fontFamily:"monospace",cursor:"pointer"}}>
                        + Pak
                      </button>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:"10px",marginTop:"6px",flexWrap:"wrap"}}>
                      <StatPills statsStr={p.stats} type={p.type} />
                      {p.scarcityLabel && (
                        <span style={{fontSize:"9px",fontFamily:"monospace",color:p.scarcityColor,background:p.scarcityColor+"18",border:"1px solid "+p.scarcityColor+"44",padding:"2px 7px",borderRadius:"3px",letterSpacing:"1px"}}>
                          {p.scarcityLabel + " (" + p.rem + " over)"}
                        </span>
                      )}
                    </div>
                    {p.benchBoost && (
                      <div style={{fontSize:"10px",color:"#7ac0f0",marginTop:"4px"}}>{"hitter bonus — bench heeft genoeg pitchers"}</div>
                    )}
                    {p.bonus > 0 && !p.benchBoost && (
                      <div style={{fontSize:"10px",color:"#5cb87a",marginTop:"4px"}}>{"+" + p.bonus + " bonus — " + (p.needWhy || "hoge waarde")}</div>
                    )}
                    {p.rpCapped && (
                      <div style={{fontSize:"10px",color:"#ffc107",marginTop:"3px"}}>{"3 closers al — niet aanbevolen"}</div>
                    )}
                    {p.penalty > 0 && !p.rpCapped && (
                      <div style={{fontSize:"10px",color:"#e07a5a",marginTop:"3px"}}>{"Te vroeg voor deze positie (ronde " + round + ")"}</div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {tab === "MYROSTER" && (
            <div style={{flex:"1",overflowY:"auto",padding:"14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
                <div style={{fontSize:"9px",color:"#3a5a6a",fontFamily:"monospace",letterSpacing:"2px"}}>{"MIJN ROSTER — " + myRoster.length + "/25"}</div>
                <div style={{display:"flex",gap:"10px",alignItems:"center"}}>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:"8px",color:"#3a5a6a",fontFamily:"monospace"}}>TOTAAL</div>
                    <div style={{fontSize:"12px",color:"#FFD700",fontFamily:"monospace"}}>{"~" + myRoster.reduce((s,p) => s+p.pts, 0).toLocaleString() + " pts"}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:"8px",color:"#3a5a6a",fontFamily:"monospace"}}>BENCH</div>
                    {(() => { const bpts = filledSlots.filter(s => s.id.startsWith("BE") && s.player).reduce((sum,s) => sum+s.player.pts, 0); const bc = bpts >= 1400 ? "#5cb87a" : bpts >= 1000 ? "#ffc107" : "#e05c5c"; return <div style={{fontSize:"12px",color:bc,fontFamily:"monospace"}}>{"~" + bpts.toLocaleString() + " pts"}</div>; })()}
                  </div>
                </div>
              </div>
              {filledSlots.map(slot => {
                const sc = slotCol(slot.label);
                const empty = !slot.player;
                return (
                  <div key={slot.id} style={{
                    display:"grid",gridTemplateColumns:"64px 1fr",
                    alignItems:"center",marginBottom:"3px",
                    background: empty ? "rgba(255,255,255,0.008)" : "rgba(255,255,255,0.022)",
                    border: empty ? "1px solid #0f1a26" : "1px solid "+sc+"30",
                    borderLeft: "3px solid "+sc+(empty ? "35" : "90"),
                    borderRadius:"6px",padding:"8px 14px",minHeight:"42px"
                  }}>
                    <span style={{fontSize:"10px",fontFamily:"monospace",color:sc}}>{slot.label}</span>
                    {empty ? (
                      <span style={{fontSize:"11px",color:"#1e2e3e",fontStyle:"italic"}}>leeg</span>
                    ) : (
                      <div>
                        <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"3px"}}>
                          <span style={{fontSize:"13px",color:"#f0e8d8",fontWeight:"500"}}>{slot.player.name}</span>
                          <span style={{fontSize:"10px",fontFamily:"monospace",color:pCol(slot.player.cats)}}>{slot.player.team}</span>
                          <PosBadge cats={slot.player.cats} />
                          <PtsBadge pts={slot.player.pts} />
                        </div>
                        <StatPills statsStr={slot.player.stats} type={slot.player.type} />
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

        </div>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
